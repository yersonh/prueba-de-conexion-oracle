name = "mi-app-php"

[phases.setup]
nixPkgs = [
  "php81", 
  "php81Extensions.mbstring", 
  "php81Extensions.pdo", 
  "php81Extensions.pdo_pgsql",
  "php81Extensions.pgsql",
  "php81Extensions.gd",
  "php81Extensions.curl",
  "php81Extensions.xml",
  "php81Extensions.zip",
  "postgresql"
]

[phases.install]
cmds = [
  "mkdir -p /app/public",
  "echo 'Directorio public creado'"
]

[phases.build]
cmds = [
  "echo 'Construyendo aplicación PHP...'",
  "php -v",
  "php -m | grep pgsql",
  "echo 'Build completado'"
]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t public"

[env]
PHP_VERSION = "8.1"
APP_ENV = "production"